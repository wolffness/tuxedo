name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2026.5.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        if: matrix.apt_packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Configure cross linker
        if: matrix.linker
        run: |
          target_upper=$(echo "${{ matrix.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${target_upper}_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          version="${{ inputs.tag || github.ref_name }}"
          stage="tuxedo-${version}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/tuxedo" "dist/${stage}/"
          cp README.md "dist/${stage}/" 2>/dev/null || true
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          shasum -a 256 "dist/${stage}.tar.gz" > "dist/${stage}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ inputs.tag || github.ref_name }}"
          $stage = "tuxedo-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/tuxedo.exe" "dist/$stage/"
          if (Test-Path README.md) { Copy-Item README.md "dist/$stage/" }
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip"
          (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash | Out-File -Encoding ascii "dist/$stage.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tuxedo-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

