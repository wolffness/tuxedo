name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Add rustfmt and clippy
        run: rustup component add rustfmt clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: mise run fmt

      - name: cargo clippy
        run: mise run clippy

      - name: cargo test
        run: mise run test

  macos-agent:
    name: macOS agent tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compile and test the native agent
        run: bash scripts/test-macos-agent.sh
